[platformio]
default_envs = esp32, esp8266

[env:esp32]
platform = espressif32
board = 4d_systems_esp32s3_gen4_r8n16
framework = arduino
test_framework = unity
test_build_src = yes
monitor_speed = 115200
lib_deps =
    bblanchon/ArduinoJson

[env:esp8266]
platform = espressif8266
board = nodemcuv2
framework = arduino
test_framework = unity
test_build_src = yes
monitor_speed = 115200
upload_speed = 921600
lib_deps =
    bblanchon/ArduinoJson
